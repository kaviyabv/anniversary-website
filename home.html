<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1dc);
overflow:hidden;
}

/* Floating Hearts */

.heart{
position:absolute;
bottom:-40px;
font-size:20px;
color:white;
animation:float 8s linear infinite;
opacity:.8;
}

@keyframes float{

0%{
transform:translateY(0) scale(.5);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-110vh) scale(1.5);
opacity:0;
}

}

.card{

width:500px;
max-width:90%;

padding:40px;

text-align:center;

background:rgba(255,255,255,.22);

backdrop-filter:blur(18px);

border-radius:25px;

box-shadow:0 15px 35px rgba(0,0,0,.2);

animation:popup .8s;

}

@keyframes popup{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}

.circle{

width:120px;
height:120px;

margin:auto;

border-radius:50%;

background:white;

display:flex;

justify-content:center;
align-items:center;

font-size:60px;

animation:beat 1s infinite;

}

@keyframes beat{

0%{transform:scale(1);}
50%{transform:scale(1.12);}
100%{transform:scale(1);}

}

#loading{

font-size:24px;

font-weight:bold;

margin-top:30px;

color:#ff2d6f;

min-height:40px;

}

.progress{

width:100%;

height:12px;

background:white;

border-radius:20px;

margin-top:20px;

overflow:hidden;

display:none;

}

.bar{

height:100%;

width:0%;

background:#ff4f81;

transition:.05s;

}

#welcome{

display:none;

margin-top:30px;

animation:fade 1s;

}

#welcome h1{

color:#ff2d6f;

font-size:38px;

margin-bottom:15px;

}

#welcome p{

color:#555;

line-height:30px;

font-size:17px;

}

button{

margin-top:30px;

padding:14px 35px;

border:none;

border-radius:30px;

background:#ff4f81;

color:white;

font-size:17px;

cursor:pointer;

display:none;

}

button:hover{

transform:scale(1.08);

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="card">

<div class="circle">❤️</div>

<div id="loading">Loading...</div>

<div class="progress" id="progress">

<div class="bar" id="bar"></div>

</div>

<div id="welcome">

<h1>Welcome Home My Love ❤️</h1>

<p>

You've successfully unlocked my little world. 🥹❤️

Every page ahead is filled with memories,

love,

and surprises made only for you.

</p>

</div>

<button id="nextBtn" onclick="location.href='letter.html'">

Open My Heart ❤️

</button>

</div>

<script>

/* Floating Hearts */

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(15+Math.random()*25)+"px";

heart.style.animationDuration=(5+Math.random()*5)+"s";

heart.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(heart);

}

const loading=document.getElementById("loading");
const progress=document.getElementById("progress");
const bar=document.getElementById("bar");
const welcome=document.getElementById("welcome");
const nextBtn=document.getElementById("nextBtn");

setTimeout(function(){

loading.innerHTML="Checking Heart Connection ❤️";

progress.style.display="block";

let percent=0;

let timer=setInterval(function(){

percent++;

bar.style.width=percent+"%";

if(percent>=100){

clearInterval(timer);

loading.innerHTML="100%<br><br>✅ Connected Successfully ❤️";

setTimeout(function(){

loading.style.display="none";

progress.style.display="none";

welcome.style.display="block";

nextBtn.style.display="inline-block";

},1500);

}

},30);

},1200);

</script>

</body>
</html>
