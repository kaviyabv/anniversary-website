<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Reasons I Love You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
overflow:hidden;
}

/* Floating Hearts */

.heart{
position:absolute;
bottom:-40px;
font-size:20px;
color:white;
animation:float 8s linear infinite;
opacity:.7;
}

@keyframes float{

0%{
transform:translateY(0) scale(.5);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-110vh) scale(1.5);
opacity:0;
}

}

/* Card */

.card{

width:520px;
max-width:90%;

background:rgba(255,255,255,.22);

backdrop-filter:blur(18px);

padding:35px;

border-radius:25px;

box-shadow:0 15px 35px rgba(0,0,0,.2);

text-align:center;

animation:pop .8s;

}

@keyframes pop{

from{
transform:scale(.8);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

h1{

color:#ff2d6f;
margin-bottom:20px;

}

#reason{

margin:35px 0;

font-size:24px;

font-weight:600;

color:#444;

min-height:90px;

display:flex;
justify-content:center;
align-items:center;

transition:.4s;

}

button{

padding:14px 35px;

margin:10px;

border:none;

border-radius:30px;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.08);

}

.random{

background:#ff4f81;
color:white;

}

.next{

background:white;
color:#ff2d6f;

}

</style>

</head>

<body>

<div class="card">

<h1>❤️ Reasons Why I Love You ❤️</h1>

<div id="reason">
Click the button below 🥹
</div>

<button class="random" onclick="showReason()">
Show Me ❤️
</button>

<button class="next" onclick="nextPage()">
Next Surprise ➜
</button>

</div>

<script>

/* Floating Hearts */

for(let i=0;i<40;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(15+Math.random()*25)+"px";

h.style.animationDuration=(5+Math.random()*6)+"s";

document.body.appendChild(h);

}

/* Reasons */

const reasons=[

"❤️ Because your smile makes my day.",
"🥹 Because you always care for me.",
"💕 Because you understand me.",
"🌍 Because distance can't change our love.",
"😊 Because you make me laugh.",
"💖 Because you're my comfort zone.",
"🌸 Because you're kind.",
"💞 Because you're honest.",
"✨ Because you're my best friend.",
"🥰 Because you're always there for me.",
"❤️ Because I feel safe with you.",
"🌹 Because you believe in me.",
"💌 Because your messages make me smile.",
"😍 Because you're adorable.",
"💫 Because you never give up on us.",
"🎁 Because every moment with you is special.",
"💗 Because your voice calms me.",
"🤍 Because you're my happiness.",
"🌈 Because life is beautiful with you.",
"💍 Because I see my future with you."

];

function showReason(){

let random=Math.floor(Math.random()*reasons.length);

document.getElementById("reason").innerHTML=reasons[random];

}

function nextPage(){

window.location.href="gift.html";

}

</script>

</body>
</html>
