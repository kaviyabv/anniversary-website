<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Gift ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1dc);
}

/* Floating Hearts */

.heart{
position:absolute;
bottom:-40px;
font-size:20px;
color:white;
animation:float 8s linear infinite;
opacity:.8;
}

@keyframes float{

0%{
transform:translateY(0) scale(.5);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-110vh) scale(1.5);
opacity:0;
}

}

/* Gift Box */

.container{
text-align:center;
}

h1{
color:#ff2d6f;
margin-bottom:15px;
}

p{
color:#555;
margin-bottom:35px;
font-size:17px;
}

.gift{

width:180px;
height:180px;
margin:auto;
cursor:pointer;
position:relative;
transition:.5s;

}

.gift:hover{

transform:scale(1.05);

}

/* Box */

.box{

position:absolute;
bottom:0;
width:180px;
height:120px;
background:#ff4f81;
border-radius:0 0 15px 15px;

}

.box::before{

content:"";
position:absolute;
left:50%;
transform:translateX(-50%);
width:20px;
height:120px;
background:#fff;

}

/* Lid */

.lid{

position:absolute;
top:30px;
width:180px;
height:35px;
background:#ff2d6f;
border-radius:10px;
transition:.8s;

}

.lid::before{

content:"";
position:absolute;
left:50%;
transform:translateX(-50%);
width:20px;
height:35px;
background:white;

}

/* Ribbon */

.ribbon{

position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
font-size:45px;

}

#message{

margin-top:40px;

font-size:25px;

font-weight:bold;

color:#ff2d6f;

display:none;

animation:fade 1s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

button{

margin-top:30px;
padding:14px 35px;
border:none;
border-radius:30px;
background:#ff4f81;
color:white;
font-size:16px;
cursor:pointer;
display:none;

}

button:hover{

transform:scale(1.08);

}

</style>

</head>

<body>

<div class="container">

<h1>🎁 A Special Gift For You ❤️</h1>

<p>Tap the gift box to open it...</p>

<div class="gift" onclick="openGift()">

<div class="lid" id="lid"></div>

<div class="box"></div>

<div class="ribbon">🎀</div>

</div>

<div id="message">

🥹❤️

The biggest gift I can ever give you...

Is My Heart.

Happy 4th Love Anniversary My Love ❤️

</div>

<button id="next" onclick="nextPage()">
Next Surprise ➜
</button>

</div>

<script>

/* Floating Hearts */

for(let i=0;i<45;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(15+Math.random()*25)+"px";

h.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(h);

}

function openGift(){

document.getElementById("lid").style.transform="translateY(-90px) rotate(-20deg)";

document.getElementById("message").style.display="block";

document.getElementById("next").style.display="inline-block";

}

function nextPage(){

window.location.href="countdown.html";

}

</script>

</body>
</html>
