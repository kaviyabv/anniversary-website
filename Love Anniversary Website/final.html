<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever With You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}


body{

min-height:100vh;

background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1dc);

display:flex;

justify-content:center;

align-items:center;

padding:40px 20px;

overflow-y:auto;

}



/* Hearts */

.heart{

position:fixed;

bottom:-50px;

font-size:25px;

color:white;

animation:float 8s linear infinite;

opacity:.8;

}



@keyframes float{

0%{

transform:translateY(0) scale(.5);

opacity:0;

}


30%{

opacity:1;

}


100%{

transform:translateY(-110vh) scale(1.5);

opacity:0;

}

}




.container{

width:800px;

max-width:95%;

background:rgba(255,255,255,.25);

backdrop-filter:blur(20px);

border-radius:35px;

padding:45px;

text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,.25);

animation:open 1.5s;

}



@keyframes open{

from{

opacity:0;

transform:scale(.7);

}


to{

opacity:1;

transform:scale(1);

}

}




h1{

font-family:'Dancing Script',cursive;

font-size:65px;

color:#ff1f68;

}



.subtitle{

font-size:22px;

color:#555;

margin:20px;

}



/* Video */


.video-box{

border-radius:30px;

overflow:hidden;

box-shadow:0 15px 35px rgba(0,0,0,.3);

}


video{

width:100%;

display:block;

}





/* Audio */


.audio-box{

margin-top:30px;

padding:20px;

background:rgba(255,255,255,.35);

border-radius:25px;

}


audio{

width:100%;

}




.message{

margin-top:35px;

font-size:21px;

line-height:38px;

color:#444;

}





.type{

margin-top:30px;

font-size:30px;

font-weight:bold;

color:#ff2468;

}





.love{

font-size:45px;

margin-top:20px;

animation:beat 1s infinite;

}


@keyframes beat{

50%{

transform:scale(1.2);

}

}



/* Anniversary Button */


.anniversary{

margin-top:40px;

padding:18px 50px;

border:none;

border-radius:50px;

background:#ff2f6d;

color:white;

font-size:22px;

font-weight:600;

cursor:pointer;

box-shadow:0 10px 25px rgba(255,47,109,.5);

animation:pulse 1.5s infinite;

}



@keyframes pulse{

50%{

transform:scale(1.08);

}

}




button:hover{

transform:scale(1.1);

}




.back{

margin-top:25px;

padding:14px 40px;

border:none;

border-radius:40px;

background:#ff6b9d;

color:white;

font-size:18px;

cursor:pointer;

}



</style>

</head>



<body>



<div class="container">


<h1>

Dear Love ❤️

</h1>


<div class="subtitle">

A Special Surprise For You 🥹❤️

</div>




<div class="video-box">


<video autoplay loop controls>

<source src="love-video.mp4" type="video/mp4">

</video>


</div>





<div class="audio-box">


<h3>

🎧 My Voice Message ❤️

</h3>


<br>


<audio controls autoplay>

<source src="voice-message.mp3" type="audio/mpeg">

</audio>



</div>






<div class="message">


Every second with you is special ❤️

<br><br>

This small video carries my love,

my feelings and my memories.

<br><br>

Distance can never change my love for you.

<br>

You are my today,

my tomorrow,

and my forever ❤️


</div>




<div class="type">

Forever Mine ❤️

</div>




<div class="love">

❤️🥹❤️

</div>





<button class="anniversary" onclick="showLove()">

❤️ Happy 4th Year Love Anniversary ❤️

</button>





<br>



<button class="back" onclick="backPage()">

Back To Memories ❤️

</button>



</div>






<script>


// Floating Hearts


for(let i=0;i<60;i++){


let heart=document.createElement("div");


heart.className="heart";


heart.innerHTML="❤";


heart.style.left=Math.random()*100+"vw";


heart.style.fontSize=(15+Math.random()*30)+"px";


heart.style.animationDuration=(5+Math.random()*5)+"s";


heart.style.animationDelay=Math.random()*5+"s";


document.body.appendChild(heart);


}





function showLove(){


alert("🥹❤️ Happy 4th Year My Love ❤️🥹\n\nThank you for choosing me forever...");


}




function backPage(){

window.location.href="index.html";

}


</script>



</body>

</html>
